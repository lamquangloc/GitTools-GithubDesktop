<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <!-- Nút toggle dark mode -->
        <button id="dark-mode-btn" class="theme-toggle" title="Chuyển Dark/Light Mode">🌙</button>

        <h1>📝 Todo List</h1>

        <!-- Form thêm todo -->
        <div class="add-todo">
            <input type="text" id="todo-input" placeholder="Nhập công việc cần làm...">
            <button id="add-btn">Thêm</button>
        </div>

        <!-- Bộ lọc -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Tất cả</button>
            <button class="filter-btn" data-filter="active">Chưa xong</button>
            <button class="filter-btn" data-filter="completed">Hoàn thành</button>
        </div>

        <!-- Danh sách todo -->
        <ul id="todo-list">
            <!-- Todos sẽ được render ở đây bởi renderTodo.js -->
        </ul>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
